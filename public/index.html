<!DOCTYPE html>
<html>
<head>
  <title>Katabump Hybrid</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: #1e293b; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #334155; color: white; }
    button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
    button:hover { background: #2563eb; }
    #qr { margin-top: 20px; }
    #qr img { width: 250px; border-radius: 10px; background: white; padding: 10px; }
    .note { font-size: 12px; color: #94a3b8; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🚀 Katabump Hybrid</h2>
    <input id="number" placeholder="947XXXXXXXX" />
    <button onclick="getQR()">📱 Get QR Code</button>
    <button onclick="getPair()" style="background:#10b981">🔢 Get Pairing Code</button>
    <div id="qr"></div>
    <div class="note">QR = Scan කරන්න | Pair = Console එකේ Code බලන්න</div>
  </div>

  <script>
    async function getQR() {
      const num = document.getElementById('number').value;
      document.getElementById('qr').innerHTML = 'Loading...';
      const res = await fetch('/getqr', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({number: num}) });
      const data = await res.json();
      if (data.qr) document.getElementById('qr').innerHTML = `<img src="${data.qr}"><p>Scan within 2 minutes</p>`;
      else document.getElementById('qr').innerHTML = `<p style="color:red">${data.error}</p>`;
    }
    async function getPair() {
      const num = document.getElementById('number').value;
      document.getElementById('qr').innerHTML = 'Generating...';
      const res = await fetch('/getpair', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({number: num}) });
      const data = await res.json();
      document.getElementById('qr').innerHTML = `<p style="color:#10b981">${data.message}<br>Check Console!</p>`;
    }
  </script>
