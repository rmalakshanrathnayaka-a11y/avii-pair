<!DOCTYPE html><html><head><meta charset="UTF-8"><title>AVII QR</title><style>body{background:#0a0a0f;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0}.card{background:rgba(255,255,255,0.05);padding:40px;border-radius:24px;text-align:center}h1{background:linear-gradient(135deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}#qr{margin:20px 0;padding:20px;background:#fff;border-radius:12px;display:inline-block}#qr img{width:256px;height:256px}</style></head><body><div class="card"><h1>AVII-PAIR QR</h1><div id="qr"></div><div id="status">Loading...</div></div><script>async function check(){const r=await fetch('/api/qr');const d=await r.json();if(d.qr){document.getElementById('qr').innerHTML=`<img src="${d.qr}">`;document.getElementById('status').textContent='Scan with WhatsApp'}else if(d.status==='connected'){document.getElementById('qr').innerHTML='✅';document.getElementById('status').textContent='Connected: '+d.user}else{document.getElementById('status').textContent='Starting...'}}setInterval(check,3000);check()</script></body></html>
