
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVII-PAIR | WhatsApp Bot Pairing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui}
body{background:#0a0a0f;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background-image:radial-gradient(circle at 20% 30%,#1a0033 0%,transparent 50%),radial-gradient(circle at 80% 70%,#003366 0%,transparent 50%)}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#a855f7,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
p{opacity:0.7;margin-bottom:30px;font-size:14px}
input{width:100%;padding:16px;background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:16px;margin-bottom:16px;outline:none;transition:0.3s}
input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,0.2)}
button{width:100%;padding:16px;background:linear-gradient(135deg,#a855f7,#3b82f6);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:0.3s}
button:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(168,85,247,0.4)}
button:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.result{margin-top:24px;padding:20px;background:rgba(0,0,0,0.4);border-radius:12px;display:none;border:1px solid rgba(168,85,247,0.3)}
.code{font-size:32px;font-weight:700;letter-spacing:4px;text-align:center;margin:12px 0;font-family:monospace;color:#a855f7}
.steps{margin-top:16px;font-size:13px;opacity:0.8;line-height:1.6}
.error{color:#ef4444;text-align:center;padding:12px}
.loader{display:inline-block;width:20px;height:20px;border:3px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <h1>AVII-PAIR</h1>
  <p>WhatsApp Bot Pairing System v2.0</p>
  <input id="number" placeholder="9477xxxxxxxx" type="tel">
  <button id="btn" onclick="getCode()">Get Pair Code</button>
  <div id="result" class="result">
    <div id="content"></div>
  </div>
</div>
<script>
async function getCode(){
  const num=document.getElementById('number').value.trim();
  const btn=document.getElementById('btn');
  const res=document.getElementById('result');
  const content=document.getElementById('content');

  if(!num || num.length<10){alert('Enter valid number like 9477xxxxxxx');return}

  btn.disabled=true;
  btn.innerHTML='<span class="loader"></span> Connecting...';
  res.style.display='block';
  content.innerHTML='<div style="text-align:center;opacity:0.7">Connecting to WhatsApp...</div>';

  try{
    const r=await fetch(`/api/pair?number=${encodeURIComponent(num)}`);
    const data=await r.json();

    if(data.error) throw new Error(data.error);

    if(data.code==='ALREADY_PAIRED'){
      content.innerHTML='<div class="error">Already paired! Delete session to re-pair.</div>';
    }else{
      content.innerHTML=`<div style="text-align:center;font-size:12px;opacity:0.6;margin-bottom:8px">YOUR PAIR CODE</div><div class="code">${data.code}</div><div class="steps"><b>Steps:</b><br>1. Open WhatsApp<br>2. Linked Devices → Link a Device<br>3. Tap "Link with phone number"<br>4. Enter this code<br><br><small>Code expires in 2 minutes</small></div>`;
    }
  }catch(e){
    content.innerHTML=`<div class="error">${e.message}<br><br>Wait 30s and try again</div>`;
  }

  btn.disabled=false;
  btn.textContent='Get Pair Code';
}
</script>
</body>
</html>
