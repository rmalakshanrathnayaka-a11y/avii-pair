<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVII-PAIR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
            font-size: 28px;
        }
        p { color: #8b949e; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: #c9d1d9;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #238636;
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled { background: #484f58; cursor: not-allowed; }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #0d1117;
            border-radius: 6px;
            display: none;
        }
        .code { font-size: 24px; font-weight: bold; color: #58a6ff; letter-spacing: 3px; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AVII-PAIR</h1>
        <p>Get WhatsApp Pair Code</p>
        <form id="pairForm">
            <input type="text" id="number" placeholder="94742260678" required>
            <button type="submit" id="submitBtn">Get Pair Code</button>
        </form>
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('pairForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const number = document.getElementById('number').value;
            const btn = document.getElementById('submitBtn');
            const result = document.getElementById('result');
            
            btn.innerText = 'Connecting...';
            btn.disabled = true;
            result.style.display = 'none';

            try {
                const res = await fetch('/pair', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ number })
                });
                const data = await res.json();
                
                if (data.code) {
                    result.innerHTML = `<div>Your Pair Code:</div><div class="code">${data.code}</div>`;
                    result.style.display = 'block';
                } else {
                    result.innerHTML = `<div style="color:#f85149">Error: ${data.error}</div>`;
                    result.style.display = 'block';
                }
            } catch (err) {
                result.innerHTML = `<div style="color:#f85149">Failed: ${err.message}</div>`;
                result.style.display = 'block';
            }
            
            btn.innerText = 'Get Pair Code';
            btn.disabled = false;
        });
    </script>
</body>
</html>
